<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LeadOn — Leadership Growth Platform" />
    <title>LeadOn</title>
    <style>
      /* Critical CSS — prevents blank flash before React loads */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9fafb; }
      #root { min-height: 100vh; }
      #app-loader {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; background: #f9fafb; z-index: 9999;
      }
      .loader-dot {
        width: 10px; height: 10px; border-radius: 50%; background: #059669;
        margin: 0 4px; animation: bounce 0.6s infinite alternate;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-12px); opacity: 0.4; } }
    </style>
  </head>
  <body>
    <!-- Visible immediately before React hydrates — eliminates blank screen LCP -->
    <div id="app-loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <div id="root"></div>
    <script>
      // Remove loader once React mounts
      window.addEventListener("react-ready", () => {
        const el = document.getElementById("app-loader");
        if (el) el.remove();
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
