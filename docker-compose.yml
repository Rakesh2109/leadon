services:
  postgres:
    image: postgres:16-alpine
    container_name: leadon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leadon}
      POSTGRES_USER: ${POSTGRES_USER:-leadon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - leadon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leadon} -d ${POSTGRES_DB:-leadon}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  leadon_postgres_data:
